name: Spring Boot Deploy (Blue/Green)

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
        description: 'Environment (dev, pro, etc.)'
      project-name:
        type: string
        required: true
        description: 'Project name'
      application-name:
        type: string
        default: 'api'
        description: 'Application name'
      image-tag:
        type: string
        required: true
        description: 'Docker image tag to deploy'
      container-port:
        type: string
        default: '8080'
        description: 'Container internal port'
      blue-port:
        type: string
        required: true
        description: 'Blue deployment port'
      green-port:
        type: string
        required: true
        description: 'Green deployment port'
      domain:
        type: string
        required: true
        description: 'Domain for Nginx config'
      health-check-path:
        type: string
        default: '/actuator/health/liveness'
        description: 'Health check endpoint'
      health-check-attempts:
        type: number
        default: 30
        description: 'Max health check attempts'
      java-opts:
        type: string
        default: '-Xms512m -Xmx1024m'
        description: 'JVM options'
      docker-env-vars:
        type: string
        default: ''
        description: 'Additional docker -e flags (multiline, one per line: KEY=value)'
      docker-volumes:
        type: string
        default: ''
        description: 'Docker volume mounts (multiline, format: host_path:container_path)'
      nginx-conf-dir:
        type: string
        default: '/etc/nginx/sites-available'
        description: 'Nginx sites-available directory path'
      nginx-reload-cmd:
        type: string
        default: 'sudo systemctl reload nginx'
        description: 'Command to reload Nginx'
      nginx-test-cmd:
        type: string
        default: 'sudo nginx -t'
        description: 'Command to test Nginx config'
      path-prefix:
        type: string
        default: ''
        description: 'PATH prefix to prepend (e.g., /opt/homebrew/bin:/usr/local/bin)'
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_KEY:
        required: false
      SSH_PASSWORD:
        required: false
      SSH_PORT:
        required: false
      DOCKER_HUB_USERNAME:
        required: true
      DOCKER_HUB_ACCESS_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Validate SSH credentials
        run: |
          if [ -z "${{ secrets.SSH_KEY }}" ] && [ -z "${{ secrets.SSH_PASSWORD }}" ]; then
            echo "❌ Either SSH_KEY or SSH_PASSWORD must be provided"
            exit 1
          fi

      - name: Deploy with Blue/Green strategy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            if [ -n "${{ inputs.path-prefix }}" ]; then
              export PATH="${{ inputs.path-prefix }}:$PATH"
            fi

            echo "🚀 Starting Blue/Green deployment..."

            # Docker Hub login (write auth directly to avoid macOS keychain issues)
            echo "🔐 Authenticating Docker Hub..."
            DOCKER_CONFIG_DIR=$(mktemp -d)
            AUTH_TOKEN=$(printf '%s:%s' "${{ secrets.DOCKER_HUB_USERNAME }}" "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | base64)
            printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}' "$AUTH_TOKEN" > "$DOCKER_CONFIG_DIR/config.json"
            export DOCKER_CONFIG="$DOCKER_CONFIG_DIR"
            echo "✅ Docker Hub authenticated"

            # Variables
            IMAGE_TAG="${{ inputs.image-tag }}"
            PROJECT="${{ inputs.project-name }}"
            APP="${{ inputs.application-name }}"
            ENV="${{ inputs.environment }}"
            CONTAINER_PORT="${{ inputs.container-port }}"
            BLUE_PORT="${{ inputs.blue-port }}"
            GREEN_PORT="${{ inputs.green-port }}"
            JAVA_OPTS="${{ inputs.java-opts }}"
            CONTAINER_PREFIX="${PROJECT}-${APP}-${ENV}"

            echo "📦 Image: $IMAGE_TAG"
            echo "☕ JVM Options: $JAVA_OPTS"
            echo "🔧 Container prefix: $CONTAINER_PREFIX"

            # Pull image
            echo "🔄 Pulling Docker image..."
            if ! docker pull $IMAGE_TAG; then
              echo "❌ Docker pull failed!"
              exit 1
            fi
            echo "✅ Pull completed"

            # Determine current active container and port
            echo "🔍 Detecting current deployment..."
            CURRENT_CONTAINER=$(docker ps --filter "name=${CONTAINER_PREFIX}" --format "{{.Names}}" | head -1)

            if [[ -n "$CURRENT_CONTAINER" ]]; then
              CURRENT_PORT=$(docker port $CURRENT_CONTAINER | grep "$CONTAINER_PORT/tcp" | cut -d':' -f2)
              echo "🔵 Current: $CURRENT_CONTAINER (port $CURRENT_PORT)"

              if [[ "$CURRENT_PORT" == "$BLUE_PORT" ]]; then
                NEW_PORT=$GREEN_PORT
                COLOR="GREEN"
              else
                NEW_PORT=$BLUE_PORT
                COLOR="BLUE"
              fi
            else
              NEW_PORT=$BLUE_PORT
              COLOR="BLUE"
              echo "🆕 No existing container found - first deployment"
            fi

            NEW_CONTAINER="${CONTAINER_PREFIX}-${COLOR}"
            echo "🎯 Target: $NEW_CONTAINER (port $NEW_PORT, color $COLOR)"

            # Stop old container on same color if exists
            echo "🧹 Cleaning up previous $COLOR container..."
            docker stop $NEW_CONTAINER 2>/dev/null || true
            docker rm $NEW_CONTAINER 2>/dev/null || true

            # Build docker run command
            echo "🔨 Building docker run command..."
            DOCKER_CMD="docker run -d --name $NEW_CONTAINER"
            DOCKER_CMD="$DOCKER_CMD -p $NEW_PORT:$CONTAINER_PORT"
            DOCKER_CMD="$DOCKER_CMD -e SPRING_PROFILES_ACTIVE=$ENV"
            DOCKER_CMD="$DOCKER_CMD -e JAVA_OPTS=\"$JAVA_OPTS\""

            # Additional env vars
            ENV_VARS="${{ inputs.docker-env-vars }}"
            if [ -n "$ENV_VARS" ]; then
              echo "📝 Adding environment variables..."
              while IFS= read -r line; do
                [ -n "$line" ] && DOCKER_CMD="$DOCKER_CMD -e \"$line\""
              done <<< "$ENV_VARS"
            fi

            # Volume mounts
            VOLUMES="${{ inputs.docker-volumes }}"
            if [ -n "$VOLUMES" ]; then
              echo "💾 Adding volume mounts..."
              while IFS= read -r line; do
                [ -n "$line" ] && DOCKER_CMD="$DOCKER_CMD -v \"$line\""
              done <<< "$VOLUMES"
            fi

            DOCKER_CMD="$DOCKER_CMD --restart always $IMAGE_TAG"

            # Start container
            echo "🚀 Starting $COLOR container..."
            eval $DOCKER_CMD

            if ! docker ps -q --filter "name=$NEW_CONTAINER" | grep -q .; then
              echo "❌ Container failed to start!"
              docker logs $NEW_CONTAINER --tail 30
              exit 1
            fi
            echo "✅ Container started"

            # Health check
            HEALTH_URL="http://localhost:$NEW_PORT${{ inputs.health-check-path }}"
            MAX_ATTEMPTS=${{ inputs.health-check-attempts }}
            HEALTH_CHECK_PASSED=false

            echo "🏥 Health check starting... ($HEALTH_URL)"
            for i in $(seq 1 $MAX_ATTEMPTS); do
              echo "  Attempt $i/$MAX_ATTEMPTS..."
              if curl -f -s "$HEALTH_URL" > /dev/null 2>&1; then
                echo "✅ Health check passed!"
                HEALTH_CHECK_PASSED=true
                break
              fi
              if ! docker ps -q --filter "name=$NEW_CONTAINER" | grep -q .; then
                echo "❌ Container stopped unexpectedly!"
                docker logs $NEW_CONTAINER --tail 30
                exit 1
              fi
              sleep 10
            done

            if [ "$HEALTH_CHECK_PASSED" = "false" ]; then
              echo "❌ Health check failed after $MAX_ATTEMPTS attempts!"
              docker logs $NEW_CONTAINER --tail 30
              docker stop $NEW_CONTAINER || true
              docker rm $NEW_CONTAINER || true
              exit 1
            fi

            # Update Nginx
            NGINX_CONF="${{ inputs.nginx-conf-dir }}/${{ inputs.domain }}"
            echo "🔄 Updating Nginx config: $NGINX_CONF"

            if [ -f "$NGINX_CONF" ]; then
              NGINX_BACKUP="${NGINX_CONF}.backup.$(date +%s)"
              cp $NGINX_CONF $NGINX_BACKUP
              echo "📋 Backup created: $NGINX_BACKUP"

              # BSD/GNU sed compatibility
              if sed --version 2>/dev/null | grep -q GNU; then
                sed -i "s/proxy_pass http:\/\/127\.0\.0\.1:[0-9]*;/proxy_pass http:\/\/127.0.0.1:$NEW_PORT;/g" $NGINX_CONF
              else
                sed -i '' "s/proxy_pass http:\/\/127\.0\.0\.1:[0-9]*;/proxy_pass http:\/\/127.0.0.1:$NEW_PORT;/g" $NGINX_CONF
              fi

              echo "🧪 Testing Nginx config..."
              if eval ${{ inputs.nginx-test-cmd }}; then
                eval ${{ inputs.nginx-reload-cmd }}
                echo "✅ Nginx updated and reloaded"
              else
                echo "❌ Nginx config error, rolling back..."
                cp $NGINX_BACKUP $NGINX_CONF
                eval ${{ inputs.nginx-reload-cmd }}
                exit 1
              fi
            else
              echo "⚠️ Nginx config not found: $NGINX_CONF (skipping)"
            fi

            # Remove old container
            if [[ -n "$CURRENT_CONTAINER" ]]; then
              echo "🧹 Removing old container: $CURRENT_CONTAINER"
              sleep 10
              docker stop $CURRENT_CONTAINER || true
              docker rm $CURRENT_CONTAINER || true
              echo "✅ Old container removed"
            fi

            echo "🗑️ Pruning unused images..."
            docker image prune -f

            echo ""
            echo "========================================="
            echo "🎉 Deployment completed!"
            echo "   Container: $NEW_CONTAINER"
            echo "   Port:      $NEW_PORT"
            echo "   Color:     $COLOR"
            echo "   Image:     $IMAGE_TAG"
            echo "   JVM:       $JAVA_OPTS"
            echo "========================================="
