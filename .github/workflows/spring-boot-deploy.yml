name: Spring Boot Deploy (Blue/Green)

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
        description: 'Environment (dev, pro, etc.)'
      project-name:
        type: string
        required: true
        description: 'Project name'
      application-name:
        type: string
        default: 'api'
        description: 'Application name'
      image-tag:
        type: string
        required: true
        description: 'Docker image tag to deploy'
      container-port:
        type: string
        default: '8080'
        description: 'Container internal port'
      blue-port:
        type: string
        required: true
        description: 'Blue deployment port'
      green-port:
        type: string
        required: true
        description: 'Green deployment port'
      domain:
        type: string
        required: true
        description: 'Domain for Nginx config'
      health-check-path:
        type: string
        default: '/actuator/health/liveness'
        description: 'Health check endpoint'
      health-check-attempts:
        type: number
        default: 30
        description: 'Max health check attempts'
      java-opts:
        type: string
        default: '-Xms512m -Xmx1024m'
        description: 'JVM options'
      docker-env-vars:
        type: string
        default: ''
        description: 'Additional docker -e flags (multiline, one per line: KEY=value)'
      docker-volumes:
        type: string
        default: ''
        description: 'Docker volume mounts (multiline, format: host_path:container_path)'
      nginx-conf-dir:
        type: string
        default: '/etc/nginx/sites-available'
        description: 'Nginx sites-available directory path'
      nginx-reload-cmd:
        type: string
        default: 'sudo systemctl reload nginx'
        description: 'Command to reload Nginx'
      nginx-test-cmd:
        type: string
        default: 'sudo nginx -t'
        description: 'Command to test Nginx config'
      path-prefix:
        type: string
        default: ''
        description: 'PATH prefix to prepend (e.g., /opt/homebrew/bin:/usr/local/bin)'
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_KEY:
        required: false
      SSH_PASSWORD:
        required: false
      SSH_PORT:
        required: false
      DOCKER_HUB_USERNAME:
        required: true
      DOCKER_HUB_ACCESS_TOKEN:
        required: true
      EMAIL_PASSWORD:
        required: false
      SLACK_WEBHOOK_URL:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Validate SSH credentials
        run: |
          if [ -z "${{ secrets.SSH_KEY }}" ] && [ -z "${{ secrets.SSH_PASSWORD }}" ]; then
            echo "❌ Either SSH_KEY or SSH_PASSWORD must be provided"
            exit 1
          fi

      - name: Deploy with Blue/Green strategy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            # Set PATH if prefix provided
            if [ -n "${{ inputs.path-prefix }}" ]; then
              export PATH="${{ inputs.path-prefix }}:$PATH"
            fi

            echo "🚀 Starting Blue/Green deployment..."

            # Docker Hub login (use temp config to avoid macOS keychain credential store)
            DOCKER_CONFIG_DIR=$(mktemp -d)
            echo '{"credsStore":""}' > "$DOCKER_CONFIG_DIR/config.json"
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker --config "$DOCKER_CONFIG_DIR" login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
            export DOCKER_CONFIG="$DOCKER_CONFIG_DIR"
            
            # Variables
            IMAGE_TAG="${{ inputs.image-tag }}"
            PROJECT="${{ inputs.project-name }}"
            APP="${{ inputs.application-name }}"
            ENV="${{ inputs.environment }}"
            CONTAINER_PORT="${{ inputs.container-port }}"
            BLUE_PORT="${{ inputs.blue-port }}"
            GREEN_PORT="${{ inputs.green-port }}"
            JAVA_OPTS="${{ inputs.java-opts }}"
            CONTAINER_PREFIX="${PROJECT}-${APP}-${ENV}"
            
            echo "📦 Image: $IMAGE_TAG"
            echo "☕ JVM Options: $JAVA_OPTS"
            
            # Pull image
            echo "🔄 Pulling Docker image..."
            if ! docker pull $IMAGE_TAG; then
              echo "❌ Docker pull failed!"
              exit 1
            fi
            echo "✅ Pull completed"
            
            # Determine current active container and port
            CURRENT_CONTAINER=$(docker ps --filter "name=${CONTAINER_PREFIX}" --format "{{.Names}}" | head -1)
            
            if [[ -n "$CURRENT_CONTAINER" ]]; then
              CURRENT_PORT=$(docker port $CURRENT_CONTAINER | grep "$CONTAINER_PORT/tcp" | cut -d':' -f2)
              echo "🔍 Current: $CURRENT_CONTAINER (port $CURRENT_PORT)"
            
              if [[ "$CURRENT_PORT" == "$BLUE_PORT" ]]; then
                NEW_PORT=$GREEN_PORT
                COLOR="GREEN"
              else
                NEW_PORT=$BLUE_PORT
                COLOR="BLUE"
              fi
            else
              NEW_PORT=$BLUE_PORT
              COLOR="BLUE"
              echo "🆕 First deployment"
            fi
            
            echo "🎯 Deploying to $COLOR (port $NEW_PORT)"
            
            # Prepare new container
            NEW_CONTAINER="${CONTAINER_PREFIX}-${COLOR}"
            
            docker stop $NEW_CONTAINER 2>/dev/null || true
            docker rm $NEW_CONTAINER 2>/dev/null || true
            
            # Build docker run command
            DOCKER_CMD="docker run -d --name $NEW_CONTAINER"
            DOCKER_CMD="$DOCKER_CMD -p $NEW_PORT:$CONTAINER_PORT"
            DOCKER_CMD="$DOCKER_CMD -e SPRING_PROFILES_ACTIVE=$ENV"
            DOCKER_CMD="$DOCKER_CMD -e JAVA_OPTS=\"$JAVA_OPTS\""
            
            # Add EMAIL_PASSWORD if provided
            if [ -n "${{ secrets.EMAIL_PASSWORD }}" ]; then
              DOCKER_CMD="$DOCKER_CMD -e EMAIL_PASSWORD=\"${{ secrets.EMAIL_PASSWORD }}\""
            fi
            
            # Add SLACK_WEBHOOK_URL if provided
            if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
              DOCKER_CMD="$DOCKER_CMD -e SLACK_WEBHOOK_URL=\"${{ secrets.SLACK_WEBHOOK_URL }}\""
            fi
            
            # Add additional env vars
            ENV_VARS="${{ inputs.docker-env-vars }}"
            if [ -n "$ENV_VARS" ]; then
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  DOCKER_CMD="$DOCKER_CMD -e \"$line\""
                fi
              done <<< "$ENV_VARS"
            fi
            
            # Add volume mounts
            VOLUMES="${{ inputs.docker-volumes }}"
            if [ -n "$VOLUMES" ]; then
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  DOCKER_CMD="$DOCKER_CMD -v \"$line\""
                fi
              done <<< "$VOLUMES"
            fi
            
            DOCKER_CMD="$DOCKER_CMD --restart always $IMAGE_TAG"
            
            # Run new container
            echo "🚀 Starting $COLOR container..."
            eval $DOCKER_CMD
            
            if ! docker ps -q --filter "name=$NEW_CONTAINER" | grep -q .; then
              echo "❌ Container failed to start!"
              docker logs $NEW_CONTAINER --tail 30
              exit 1
            fi
            
            echo "✅ Container started"
            
            # Health check
            echo "🏥 Health check starting..."
            HEALTH_URL="http://localhost:$NEW_PORT${{ inputs.health-check-path }}"
            MAX_ATTEMPTS=${{ inputs.health-check-attempts }}
            HEALTH_CHECK_PASSED=false
            
            for i in $(seq 1 $MAX_ATTEMPTS); do
              echo "  Attempt $i/$MAX_ATTEMPTS..."
            
              if curl -f -s "$HEALTH_URL" > /dev/null 2>&1; then
                echo "✅ Health check passed!"
                HEALTH_CHECK_PASSED=true
                break
              fi
            
              if ! docker ps -q --filter "name=$NEW_CONTAINER" | grep -q .; then
                echo "❌ Container stopped!"
                docker logs $NEW_CONTAINER --tail 30
                exit 1
              fi
            
              sleep 10
            done
            
            if [ "$HEALTH_CHECK_PASSED" = "false" ]; then
              echo "❌ Health check failed after $MAX_ATTEMPTS attempts!"
              docker logs $NEW_CONTAINER --tail 30
              docker stop $NEW_CONTAINER || true
              docker rm $NEW_CONTAINER || true
              exit 1
            fi
            
            # Update Nginx
            echo "🔄 Updating Nginx..."
            NGINX_CONF="${{ inputs.nginx-conf-dir }}/${{ inputs.domain }}"
            NGINX_RELOAD_CMD="${{ inputs.nginx-reload-cmd }}"
            NGINX_TEST_CMD="${{ inputs.nginx-test-cmd }}"

            if [ -f "$NGINX_CONF" ]; then
              # Store backup filename explicitly
              NGINX_BACKUP="${NGINX_CONF}.backup.$(date +%s)"
              cp $NGINX_CONF $NGINX_BACKUP
              echo "Nginx backup created: $NGINX_BACKUP"

              # Use sed compatible with both GNU and BSD
              if sed --version 2>/dev/null | grep -q GNU; then
                sed -i "s/proxy_pass http:\/\/127\.0\.0\.1:[0-9]*;/proxy_pass http:\/\/127.0.0.1:$NEW_PORT;/g" $NGINX_CONF
              else
                sed -i '' "s/proxy_pass http:\/\/127\.0\.0\.1:[0-9]*;/proxy_pass http:\/\/127.0.0.1:$NEW_PORT;/g" $NGINX_CONF
              fi

              if eval $NGINX_TEST_CMD; then
                eval $NGINX_RELOAD_CMD
                echo "✅ Nginx updated"
              else
                echo "❌ Nginx config error, rolling back..."
                cp $NGINX_BACKUP $NGINX_CONF
                eval $NGINX_RELOAD_CMD
                exit 1
              fi
            else
              echo "⚠️ Nginx config not found: $NGINX_CONF"
            fi
            
            # Verify traffic switch
            sleep 5
            if curl -f -s -k "https://${{ inputs.domain }}${{ inputs.health-check-path }}" > /dev/null 2>&1 || \
               curl -f -s "http://${{ inputs.domain }}${{ inputs.health-check-path }}" > /dev/null 2>&1; then
              echo "✅ Traffic switched successfully"
            else
              echo "⚠️ Traffic verification skipped"
            fi
            
            # Remove old container
            if [[ -n "$CURRENT_CONTAINER" ]]; then
              echo "🧹 Removing old container: $CURRENT_CONTAINER"
              sleep 10
              docker stop $CURRENT_CONTAINER || true
              docker rm $CURRENT_CONTAINER || true
            fi
            
            # Cleanup old images
            docker image prune -f
            
            echo ""
            echo "🎉 Deployment completed!"
            echo "   Container: $NEW_CONTAINER"
            echo "   Port: $NEW_PORT"
            echo "   Color: $COLOR"
            echo "   JVM: $JAVA_OPTS"
            
            echo "   Active port: $NEW_PORT"
            echo "   Active color: $COLOR"
